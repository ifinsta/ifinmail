# ifinmail full stack — Phase 1 single-VPS deployment
# 7 services: postgres, redis, postfix, dovecot, rspamd, api, nginx

services:
  # --- Databases ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ifinmail
      POSTGRES_USER: ifinmail
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?run make provision first}
      DOMAIN: ${DOMAIN:-ifinsta.online}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-ifinsta.online}
      DOVECOT_DB_PASSWORD: ${DOVECOT_DB_PASSWORD:?run make provision first}
      POSTFIX_DB_PASSWORD: ${POSTFIX_DB_PASSWORD:?run make provision first}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?run make provision first}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh:ro
      - ./postgres/custom.conf:/etc/postgresql/custom.conf:ro
      - ./certs:/etc/letsencrypt:ro
    command: >
      sh -c '
        echo "include_if_exists = \"/etc/postgresql/custom.conf\"" >> /etc/postgresql/postgresql.conf &&
        if [ -d "/etc/letsencrypt/live/${MAIL_HOSTNAME:-mail.ifinsta.online}" ]; then
          mkdir -p /etc/postgresql/certs &&
          cp "/etc/letsencrypt/live/${MAIL_HOSTNAME:-mail.ifinsta.online}/fullchain.pem" /etc/postgresql/certs/ &&
          cp "/etc/letsencrypt/live/${MAIL_HOSTNAME:-mail.ifinsta.online}/privkey.pem" /etc/postgresql/certs/ &&
          chown -R 999:999 /etc/postgresql/certs &&
          chmod 600 /etc/postgresql/certs/privkey.pem &&
          echo "ssl = on" >> /etc/postgresql/postgresql.conf &&
          echo "ssl_cert_file = \"/etc/postgresql/certs/fullchain.pem\"" >> /etc/postgresql/postgresql.conf &&
          echo "ssl_key_file = \"/etc/postgresql/certs/privkey.pem\"" >> /etc/postgresql/postgresql.conf &&
          echo "SSL enabled for PostgreSQL"
        fi &&
        docker-entrypoint.sh postgres
      '
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ifinmail"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?run make provision first}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
  postfix:
    image: ifinmail/postfix:latest
    build: ./postfix
    environment:
      MAIL_DOMAIN: ${MAIL_DOMAIN:-ifinsta.online}
      MAIL_HOSTNAME: ${MAIL_HOSTNAME:-mail.ifinsta.online}
      POSTFIX_DB_PASSWORD: ${POSTFIX_DB_PASSWORD:?run make provision first}
      PGSSLMODE: require
    volumes:
      - postfix_spool:/var/spool/postfix
      - mail_data:/var/mail/vhosts
      - ./certs/live/${MAIL_HOSTNAME:-mail.ifinsta.online}:/etc/postfix/certs:ro
      - rundir:/var/run/dovecot
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
    depends_on:
      postgres:
        condition: service_healthy
      dovecot:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "postfix status 2>/dev/null || ss -tlnp | grep -q ':25'"]
      interval: 30s
      retries: 3
      start_period: 10s

  dovecot:
    image: ifinmail/dovecot:latest
    build: ./dovecot
    environment:
      DOVECOT_DB_PASSWORD: ${DOVECOT_DB_PASSWORD:?run make provision first}
      PGSSLMODE: require
    volumes:
      - mail_data:/var/mail/vhosts
      - ./certs/live/${MAIL_HOSTNAME:-mail.ifinsta.online}:/etc/dovecot/certs:ro
      - rundir:/var/run/dovecot
    ports:
      - "143:143"
      - "993:993"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "ss -tlnp | grep -q ':993' || doveadm service status imap-login 2>/dev/null"]
      interval: 30s
      retries: 3
      start_period: 15s

  rspamd:
    image: ifinmail/rspamd:latest
    build: ./rspamd
    volumes:
      - rspamd_data:/var/lib/rspamd
      - ./dkim:/etc/dkim:ro
    ports:
      - "127.0.0.1:11332:11332"   # milter (bound to localhost)
      - "127.0.0.1:11334:11334"   # web UI (bound to localhost, security)
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "rspamc stat 2>/dev/null || ss -tlnp | grep -q ':11332'"]
      interval: 30s
      retries: 3
      start_period: 10s

  # --- Platform API ---
  api:
    image: ifinmail/api:latest
    build:
      context: ../..
      dockerfile: provisioning/docker/Dockerfile
    environment:
      DB_NAME: ifinmail
      DB_USER: ifinmail_app
      DB_PASSWORD: ${APP_DB_PASSWORD:?run make provision first}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SSLMODE: require
      DATABASE_URL: postgresql://ifinmail_app:${APP_DB_PASSWORD:?run make provision first}@postgres:5432/ifinmail?sslmode=require
      REDIS_URL: redis://:${REDIS_PASSWORD:?run make provision first}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?run make provision first}@redis:6379/1
      DJANGO_SECRET_KEY: ${SECRET_KEY:?run make provision first}
      DJANGO_SETTINGS_MODULE: backend.config.settings.production
      ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-ifinsta.online,mail.ifinsta.online}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@ifinsta.online}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-Admin!Pass123}
    volumes:
      - mail_data:/var/mail/vhosts:ro   # read Dovecot's Maildir
      - ./certs:/etc/letsencrypt:ro
      - static_data:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/ || exit 1"]
      interval: 30s
      retries: 3
      start_period: 30s
      timeout: 10s

  # --- Reverse Proxy ---
  nginx:
    image: ifinmail/nginx:latest
    environment:
      - MAIL_HOSTNAME=${MAIL_HOSTNAME:-mail.ifinsta.online}
    volumes:
      - ./nginx/conf.d/ifinmail.conf:/etc/nginx/templates/ifinmail.conf.template:ro
      - ./certs:/etc/letsencrypt:ro
      - ./nginx/www:/var/www/certbot:ro
      - static_data:/app/staticfiles:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
    command: "/bin/sh -c 'sed \"s|__SSL_CERT_HOSTNAME__|${MAIL_HOSTNAME}|g\" /etc/nginx/templates/ifinmail.conf.template > /etc/nginx/conf.d/default.conf && while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s

volumes:
  postgres_data:
  redis_data:
  postfix_spool:
  mail_data:
  rspamd_data:
  rundir:
  static_data:

networks:
  default:
    name: ifinmail-net
