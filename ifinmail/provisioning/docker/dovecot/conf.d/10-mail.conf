# Dovecot 10-mail.conf — Maildir storage settings
mail_location = maildir:/var/mail/vhosts/%d/%n

mail_uid = 5000
mail_gid = 5000

mail_privileged_group = vmail

# Mailbox creation
mailbox_list_index = yes

# First INBOX accessible — create necessary directories
namespace inbox {
  inbox = yes

  mailbox Drafts {
    auto = create
    special_use = \Drafts
  }
  mailbox Sent {
    auto = create
    special_use = \Sent
  }
  mailbox Trash {
    auto = create
    special_use = \Trash
  }
  mailbox Junk {
    auto = create
    special_use = \Junk
  }
  mailbox Archive {
    auto = create
    special_use = \Archive
  }
}
