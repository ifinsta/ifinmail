# Dovecot 10-master.conf — Service listeners for ifinmail

# Default process limits
#default_process_limit = 100
#default_client_limit = 1000

# IMAP login: rate-limit authentication attempts
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }

  # Anti-brute-force: limit concurrent login connections per IP
  service_count = 1
  process_min_avail = 2
  process_limit = 200
  client_limit = 50

  # Rate limiting: max 20 connections per IP per minute
  vsz_limit = 256 M
}

# LMTP socket for Postfix delivery
service lmtp {
  unix_listener lmtp {
    mode = 0666
    user = vmail
    group = vmail
  }
  process_limit = 10
}

# Auth socket for Postfix SASL
service auth {
  unix_listener auth {
    mode = 0666
    user = vmail
    group = vmail
  }

  # Internal userdb socket
  unix_listener auth-userdb {
    mode = 0600
    user = vmail
  }

  # Auth rate limiting
  process_limit = 50
  client_limit = 100
}

# Dovecot admin service
service stats {
  unix_listener stats-reader {
    user = vmail
    group = vmail
    mode = 0660
  }
  unix_listener stats-writer {
    user = vmail
    group = vmail
    mode = 0660
  }
}
