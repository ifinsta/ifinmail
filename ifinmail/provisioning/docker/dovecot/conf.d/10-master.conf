# Dovecot 10-master.conf — Service listeners for ifinmail

service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

# LMTP socket for Postfix delivery
service lmtp {
  unix_listener /var/run/dovecot/lmtp {
    mode = 0600
    user = postfix
    group = postfix
  }
}

# Auth socket for Postfix SASL
service auth {
  unix_listener /var/run/dovecot/auth {
    mode = 0666
    user = postfix
    group = postfix
  }

  # Internal userdb socket
  unix_listener auth-userdb {
    mode = 0600
    user = vmail
  }
}

# Dovecot admin service
service stats {
  unix_listener stats-reader {
    user = vmail
    group = vmail
    mode = 0660
  }
  unix_listener stats-writer {
    user = vmail
    group = vmail
    mode = 0660
  }
}
