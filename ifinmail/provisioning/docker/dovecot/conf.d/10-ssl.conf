# Dovecot 10-ssl.conf — TLS/SSL settings for ifinmail
ssl = required

ssl_cert = </etc/dovecot/certs/fullchain.pem
ssl_key = </etc/dovecot/certs/privkey.pem

ssl_min_protocol = TLSv1.2
ssl_cipher_list = HIGH:!aNULL:!eNULL:!EXPORT:!DES:!MD5:!PSK:!RC4
ssl_prefer_server_ciphers = yes

# DH parameters (auto-generated if missing)
ssl_dh = </etc/dovecot/dh.pem

# Prefer server cipher order
ssl_prefer_server_ciphers = yes
