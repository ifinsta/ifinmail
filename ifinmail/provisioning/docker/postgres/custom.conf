# ifinmail PostgreSQL custom configuration
# Mounted into the postgres container at /etc/postgresql/custom.conf
# Included via docker-compose command override

# === Memory Tuning (for ~256MB container) ===
shared_buffers = '64MB'                  # 25% of container memory
effective_cache_size = '128MB'            # 50% of container memory
work_mem = '4MB'                          # Per-operation sort memory
maintenance_work_mem = '32MB'             # For VACUUM, CREATE INDEX

# === Connections ===
max_connections = 50                      # 7 services + admin overhead
superuser_reserved_connections = 3        # Reserved for admin access

# === Planner Configuration ===
random_page_cost = 1.1                    # Smaller for SSDs (default 4.0)
effective_io_concurrency = 200            # For SSD (default 1)

# === Write-Ahead Log (WAL) ===
wal_buffers = '512kB'                     # 1-2% of shared_buffers
min_wal_size = '128MB'
max_wal_size = '512MB'
wal_log_hints = on                        # Required for pg_rewind

# === Autovacuum ===
autovacuum = on
autovacuum_vacuum_scale_factor = 0.01     # More aggressive vacuum (default 0.2)
autovacuum_analyze_scale_factor = 0.005   # More frequent analyze
autovacuum_vacuum_cost_limit = 200        # Higher = faster vacuum (default 200)
autovacuum_naptime = '30s'               # Check more often

# === Logging ===
log_destination = 'stderr'
logging_collector = off                   # Docker logs via stdout
log_line_prefix = '%m [%p] %q%u@%d '     # time pid user@db
log_timezone = 'UTC'
log_min_duration_statement = 1000         # Log queries slower than 1s
log_checkpoints = on
log_connections = on                      # Log new connections
log_disconnections = on                   # Log disconnections

# === Error Reporting ===
client_min_messages = notice
log_min_messages = notice
log_min_error_statement = error

# === Timeouts (also set per-database in init-db.sh) ===
idle_in_transaction_session_timeout = '60000'
statement_timeout = 0                     # 0 = disabled globally; set per-DB

# === SSL/TLS (optional — mount certs and uncomment to enable) ===
# ssl = on
# ssl_cert_file = '/etc/postgresql/certs/fullchain.pem'
# ssl_key_file = '/etc/postgresql/certs/privkey.pem'
